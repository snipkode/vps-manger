server {
    listen 80;
    server_name vps.perumdati.tech;  # Ganti dengan domain/subdomain Anda

    # Logs
    access_log /var/log/nginx/vps-manager-access.log;
    error_log /var/log/nginx/vps-manager-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to VPS Manager backend
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~* \.(env|git|sql|db|sqlite)$ {
        deny all;
    }
}
