# Stunnel Configuration - VPS Manager TLS
# Using Let's Encrypt SSL Certificate

pid = /var/run/stunnel4.pid

# Global certificate (Let's Encrypt)
cert = /etc/letsencrypt/live/perumdati.tech/fullchain.pem
key = /etc/letsencrypt/live/perumdati.tech/privkey.pem

socket = l:TCP_NODELAY=1
socket = r:TCP_NODELAY=1

# VPN API - Port 445 to 5000
[vpn-api-445]
accept = 445
connect = 5000
client = no

# WireGuard - Port 444 to 51821
[wireguard-444]
accept = 444
connect = 51821
client = no

# VPS Manager Production - Port 3443 to 3000
[vps-manager-3443]
accept = 3443
connect = 127.0.0.1:3000
client = no

# VPS Manager Dev (Vite) - Port 3001 to 3002
[vps-manager-dev-3001]
accept = 3001
connect = 127.0.0.1:3002
client = no
